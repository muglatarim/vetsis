name: Deploy to GitHub Pages

on:
  # Her push işleminde çalışsın (main branch'ine)
  push:
    branches: ["main"]
  # Manuel olarak tetikleyebilmek için
  workflow_dispatch:

# Gerekli izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek deploy çalışmasını sağlar
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: "https://ulwntnofjziidvrfqbca.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsd250bm9manppaWR2cmZxYmNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Nzg4MzksImV4cCI6MjA5MTM1NDgzOX0.A3TUgDIJFLw9r02LLoeu7rUh16lxNjtJQWPX_QQVZW4"
          VITE_HASH_SALT: "VetSis2026!MuglaKampanya#Gizli"
          VITE_MAPS_BASE_URL: "/vetsis/maps"
          VITE_DATA_BASE_URL: "/vetsis/data"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
